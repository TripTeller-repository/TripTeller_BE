version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: tripteller-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - tripteller-network

  redis:
    image: redis:alpine
    container_name: tripteller-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - tripteller-network

networks:
  tripteller-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
